version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campground-booking-system"
    ports:
      - "5000:5000"
    env_file:
      - config/config.env
    environment:
      - PORT=5000
      - NODE_ENV=production
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
